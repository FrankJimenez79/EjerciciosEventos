  <body>
    <h3>Ejercicio 4</h3>
    <ul>
      <li><a href="index.html">Atras</a></li>
    </ul>
    <p>
      Elabora un programa que vaya rellenando un párrafo de forma dinámica con
      todas las le- tras que vaya pulsando el usuario sobre cualquier elemento
      de la página. Al final del párrafo debes incluir un botón para limpiar el
      contenido del párrafo.
    </p>
    <hr />

    <p id="parrafoDinamico"></p>
    <button id="botonLimpiar">Limpiar</button>

    <script>
      const parrafo = document.querySelector("#parrafoDinamico");
      const botonLimpiar = document.querySelector("#botonLimpiar");

      document.addEventListener("keydown", (event) => {
        const teclaPulsada = event.key;
        if (teclaPulsada.length === 1) {
          parrafo.textContent = parrafo.textContent + teclaPulsada;
        }
      });

      botonLimpiar.addEventListener("click", () => {
        parrafo.textContent = "";
      });
    </script>
  </body>
