  <body>
    <h3>Ejercicio 5</h3>
    <ul>
      <li><a href="index.html">Atras</a></li>
    </ul>
    <p>
      Crea una rutina que no permita que el ratón se coloque encima de una caja
      azul de 100 x 100 px. Cada vez que el ratón intente colocarse encima, la
      posición de la caja debe cam- biar aleatoriamente por la página.
    </p>
    <hr />

    <div id="box"></div>

    <script>
      const box = document.querySelector("#box");
      box.addEventListener("mouseover", () => {
        const maxX = innerWidth - 100;
        const maxY = innerHeight - 100;
        const newX = Math.floor(Math.random() * maxX);
        const newY = Math.floor(Math.random() * maxY);
        box.style.left = `${newX}px`;
        box.style.top = `${newY}px`;
      });
    </script>
  </body>
